<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Name - Fishbowl BI</title>

    <!-- External CDNs — on restricted/on-premise networks embed these inline instead (see CLAUDE.md) -->
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- D3.js v7 (remove if not using charts) -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- Moment.js — date arithmetic for date-range helpers -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>

    <!-- DataTables (uncomment if using a sortable/paginated table)
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/v/bs4-4.1.1/jq-3.3.1/jszip-2.5.0/dt-1.10.20/b-1.6.1/b-colvis-1.6.1/b-html5-1.6.1/b-print-1.6.1/cr-1.5.2/fh-3.1.6/r-2.2.3/sc-2.0.1/datatables.min.css"/>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.36/pdfmake.min.js"></script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.36/vfs_fonts.js"></script>
    <script type="text/javascript" src="https://cdn.datatables.net/v/bs4-4.1.1/jq-3.3.1/jszip-2.5.0/dt-1.10.20/b-1.6.1/b-colvis-1.6.1/b-html5-1.6.1/b-print-1.6.1/cr-1.5.2/fh-3.1.6/r-2.2.3/sc-2.0.1/datatables.min.js"></script>
    -->

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* ============================================
           BASE STYLES
           ============================================ */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        :root {
            --color-primary: #2d9cdb;
            --color-primary-dark: #1e7bb4;
        }

        /* ============================================
           TAILWIND COLOR OVERRIDES (brand blue → indigo slots)
           ============================================ */
        .bg-indigo-600  { background-color: var(--color-primary)  !important; }
        .bg-indigo-50   { background-color: rgba(45,156,219,0.1)  !important; }
        .text-indigo-600 { color: var(--color-primary)            !important; }
        .text-indigo-700 { color: var(--color-primary-dark)       !important; }
        .border-indigo-200 { border-color: rgba(45,156,219,0.3)   !important; }
        .hover\:text-indigo-600:hover { color: var(--color-primary) !important; }
        .hover\:bg-indigo-50:hover    { background-color: rgba(45,156,219,0.1) !important; }

        /* ============================================
           SCROLLBAR
           ============================================ */
        .custom-scrollbar::-webkit-scrollbar        { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track  { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb  { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ============================================
           LOADING SPINNER
           ============================================ */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner {
            border: 3px solid #f1f5f9;
            border-top: 3px solid var(--color-primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        /* ============================================
           D3 CHART DEFAULTS
           ============================================ */
        .axis line, .axis path { stroke: #cbd5e1; shape-rendering: crispEdges; }
        .axis text  { fill: #64748b; font-size: 11px; font-weight: 500; }
        .grid line  { stroke: #e2e8f0; stroke-opacity: 0.7; shape-rendering: crispEdges; }
        .line       { fill: none; stroke-width: 2.5px; }

        /* Dashboard help tooltips — styled popover for KPI chips and chart tile (i) icons */
        .dash-tooltip {
            position: fixed;
            background: rgba(15, 23, 42, 0.95);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            line-height: 1.6;
            pointer-events: none;
            z-index: 10000;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3), 0 4px 6px -2px rgba(0,0,0,0.15);
            opacity: 0;
            transition: opacity 0.15s ease;
            max-width: 280px;
            white-space: normal;
        }
        .dash-tooltip.show { opacity: 1; }
        .info-icon-btn {
            flex-shrink: 0;
            padding: 2px;
            color: #94a3b8;
            border-radius: 4px;
            cursor: default;
            transition: color 0.15s;
            background: none;
            border: none;
        }
        .info-icon-btn:hover { color: #475569; }

        /* ============================================
           CLICKABLE LINKS
           ============================================ */
        .item-link {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .item-link:hover { text-decoration: underline; color: var(--color-primary-dark); }

        /* ============================================
           GENERIC DATA TABLE (non-DataTables)
           ============================================ */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th {
            background: #f8fafc;
            padding: 10px 14px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .data-table td { padding: 10px 14px; border-bottom: 1px solid #e2e8f0; font-size: 13px; color: #334155; }
        .data-table tbody tr:hover { background: #f8fafc; }

        /* ============================================
           CUSTOM TOOLTIP
           ============================================ */
        .custom-tooltip {
            position: absolute;
            background: rgba(15,23,42,0.95);
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
            pointer-events: none;
            z-index: 10000;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4);
            opacity: 0;
            transition: opacity 0.15s ease;
            max-width: 320px;
            white-space: pre-line;
        }
        .custom-tooltip.show { opacity: 1; }

        /* ============================================
           PRINT
           ============================================ */
        @media print {
            html, body { overflow: visible; }
            @page { size: A4 landscape; margin: 0.5in; }
            header, button, .btn { display: none !important; }
        }
    </style>
</head>

<body class="bg-slate-50">
    <!-- Custom Tooltip -->
    <div id="customTooltip" class="custom-tooltip"></div>

    <div class="flex flex-col h-screen">
        <!-- ============================================
             HEADER
             ============================================ -->
        <header id="headerContainer" class="h-20 bg-white border-b border-slate-200 px-8 flex items-center justify-between flex-shrink-0 z-20 shadow-sm" style="display:none;">
            <!-- Left: Title -->
            <div class="flex items-center gap-6">
                <div>
                    <h1 class="text-xl font-bold text-slate-900">Dashboard Title</h1>
                    <p class="text-xs text-slate-500 mt-0.5">Short description of this report</p>
                </div>
                <!-- Optional: KPI pill badges (populate via JS)
                <div id="kpiCards" class="hidden lg:flex items-center gap-3"></div>
                -->
            </div>

            <!-- Right: Actions -->
            <div class="flex items-center gap-3">
                <!-- Date Range Selector -->
                <div class="flex items-center gap-1.5 bg-slate-50 px-2 py-1.5 rounded-lg border border-slate-200">
                    <svg class="w-4 h-4 text-slate-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    <select id="dateRangeSel" onchange="handleDateRangeChange()" class="px-1 py-0.5 text-xs border-0 bg-transparent focus:ring-0 focus:outline-none text-slate-700 font-semibold cursor-pointer">
                        <option value="thisQuarter">This Quarter</option>
                        <option value="lastQuarter">Last Quarter</option>
                        <option value="thisFY" selected>This FY</option>
                        <option value="lastFY">Last FY</option>
                        <option value="thisCalYear">This Calendar Year</option>
                        <option value="lastCalYear">Last Calendar Year</option>
                        <option value="custom">Custom Range</option>
                    </select>
                </div>
                <div id="customDateInputs" class="hidden flex items-center gap-1 bg-slate-50 px-2 py-1.5 rounded-lg border border-slate-200">
                    <input type="date" id="startDate" onchange="handleCustomDateChange()" class="px-1 py-0.5 text-xs border-0 bg-transparent focus:ring-0 focus:outline-none text-slate-700">
                    <span class="text-slate-400 text-xs">to</span>
                    <input type="date" id="endDate" onchange="handleCustomDateChange()" class="px-1 py-0.5 text-xs border-0 bg-transparent focus:ring-0 focus:outline-none text-slate-700">
                </div>

                <!-- Settings -->
                <button onclick="openSettingsModal()" class="p-2.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all" title="Display Settings">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </button>

                <!-- Export CSV -->
                <button onclick="exportToCSV()" class="px-3 py-2 bg-slate-100 hover:bg-slate-200 border border-slate-300 rounded-lg text-sm font-medium transition-colors flex items-center gap-1.5" title="Export CSV">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    CSV
                </button>

                <!-- Refresh -->
                <button onclick="loadDashboard()" class="p-2.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all" title="Refresh Data">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- ============================================
             MAIN CONTENT
             ============================================ -->
        <div class="flex-1 overflow-y-auto custom-scrollbar p-4 lg:p-8">

            <!-- Filter Bar -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-4">
                <div class="flex flex-wrap gap-3 items-end">
                    <!-- Example text filter -->
                    <div class="flex-1 min-w-[140px]">
                        <label class="block text-xs font-medium text-slate-600 mb-1">Search</label>
                        <input type="text" id="filterSearch" placeholder="Filter..." onkeyup="applyFilters()" class="w-full px-2 py-1 text-sm border border-slate-300 rounded">
                    </div>
                    <!-- Example dropdown filter — populate options via loadFilters() -->
                    <div class="flex-1 min-w-[160px]">
                        <label class="block text-xs font-medium text-slate-600 mb-1">Category</label>
                        <select id="filterCategory" onchange="applyFilters()" class="w-full px-2 py-1 text-sm border border-slate-300 rounded bg-white">
                            <option value="%">All</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-1">
                        <button onclick="clearFilters()" class="px-3 py-1 text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 rounded border border-slate-300">Clear</button>
                    </div>
                </div>
            </div>

            <!-- Content Grid — replace with your charts / tables -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
                <div class="bg-white rounded-2xl shadow-md border border-slate-300 p-6">
                    <h3 class="text-base font-bold text-slate-800 mb-4">Chart / Table Area 1</h3>
                    <div id="contentArea1" style="min-height:200px;"></div>
                </div>
                <div class="bg-white rounded-2xl shadow-md border border-slate-300 p-6">
                    <h3 class="text-base font-bold text-slate-800 mb-4">Chart / Table Area 2</h3>
                    <div id="contentArea2" style="min-height:200px;"></div>
                </div>
            </div>

            <!-- Main Table Container (use when a full-width table is the primary view) -->
            <div class="bg-white rounded-2xl shadow-md border border-slate-300 p-6">
                <table id="report-table" class="data-table">
                    <thead id="reportTableHead"></thead>
                    <tbody id="reportTableBody"></tbody>
                </table>
            </div>

            <!-- Debug Console (shown when BI_SHOW_DEBUG=true) -->
            <div id="debugConsoleContainer" class="mt-6" style="display:none;">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <button onclick="toggleDebugConsole()" class="w-full px-6 py-3 flex items-center justify-between hover:bg-slate-50 transition-colors">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
                            </svg>
                            <span class="text-sm font-semibold text-slate-700">Debug Console</span>
                        </div>
                        <svg id="debugChevron" class="w-5 h-5 text-slate-400 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <div id="debugContent" class="hidden border-t border-slate-200">
                        <div class="bg-slate-900 px-4 py-2 flex items-center justify-between">
                            <span class="text-xs text-slate-400 font-mono">Application Diagnostics</span>
                            <button onclick="clearDebugLog()" class="text-xs text-slate-400 hover:text-white transition-colors">Clear</button>
                        </div>
                        <div id="debugLog" class="bg-slate-950 text-slate-200 p-4 font-mono text-xs max-h-96 overflow-y-auto" style="scrollbar-width:thin;">
                            <div class="italic" style="color:#64748b">Waiting for application to initialize...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
         LOADING OVERLAY
         ============================================ -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" style="display:none;">
        <div class="bg-white rounded-xl p-8 flex flex-col items-center gap-4 shadow-2xl">
            <div class="spinner"></div>
            <p class="text-slate-700 font-semibold">Loading data...</p>
        </div>
    </div>

    <!-- ============================================
         DRILLDOWN MODAL
         ============================================ -->
    <div id="drilldownModal" class="hidden fixed inset-0 z-50 flex items-center justify-center" style="background:rgba(0,0,0,0.4);" onclick="closeDrilldown(event)">
        <div class="bg-white rounded-2xl shadow-2xl w-11/12 max-w-5xl max-h-[90vh] flex flex-col" onclick="event.stopPropagation()">
            <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between flex-shrink-0">
                <div>
                    <h3 id="drilldownTitle" class="text-lg font-bold text-slate-900">Details</h3>
                    <p id="drilldownSubtitle" class="text-sm text-slate-500 mt-0.5"></p>
                </div>
                <button onclick="closeDrilldown()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto custom-scrollbar p-6">
                <table class="data-table">
                    <thead id="drilldownHead"></thead>
                    <tbody id="drilldownBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ============================================
         SETTINGS MODAL
         ============================================ -->
    <div id="settingsModal" class="hidden fixed inset-0 z-50 flex items-center justify-center" style="background:rgba(0,0,0,0.4);">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-6 w-[420px] max-w-full mx-4">
            <div class="flex items-center justify-between mb-5">
                <h2 class="text-base font-bold text-slate-800">Display Settings</h2>
                <button onclick="closeSettingsModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- Add report-specific settings checkboxes here -->
            <div class="space-y-3 mb-5">
                <label class="flex items-center gap-2.5 text-sm text-slate-700 cursor-pointer select-none">
                    <input type="checkbox" id="settingExample1" class="rounded border-slate-300">
                    Example Setting 1
                </label>
                <label class="flex items-center gap-2.5 text-sm text-slate-700 cursor-pointer select-none">
                    <input type="checkbox" id="settingExample2" class="rounded border-slate-300">
                    Example Setting 2
                </label>
            </div>

            <div class="flex items-center justify-between gap-2 pt-3 border-t border-slate-100">
                <!-- Left: persistent actions (save / reset) -->
                <div class="flex items-center gap-1.5">
                    <button onclick="applyAndSaveSettings()" class="p-2 text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors" title="Save settings for your account">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                            <polyline stroke-linecap="round" stroke-linejoin="round" stroke-width="2" points="17 21 17 13 7 13 7 21"/>
                            <polyline stroke-linecap="round" stroke-linejoin="round" stroke-width="2" points="7 3 7 8 15 8"/>
                        </svg>
                    </button>
                    <button onclick="resetSettingsDefaults()" class="p-2 text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg border border-slate-200 transition-colors" title="Reset to default values">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                    </button>
                </div>
                <!-- Right: session actions -->
                <div class="flex items-center gap-1.5">
                    <button onclick="closeSettingsModal()" class="px-3 py-1.5 text-sm text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg border border-slate-300 transition-colors">Cancel</button>
                    <button onclick="applySettingsOnly()" class="px-3 py-1.5 text-sm text-white bg-slate-700 hover:bg-slate-800 rounded-lg transition-colors">Apply</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
         JAVASCRIPT
         ============================================ -->
    <script>
    // ============================================================
    // FEATURE DETECTION — bail early if not inside Fishbowl
    // ============================================================
    if (typeof runQuery !== 'function' && typeof runQueryAsync !== 'function') {
        document.body.innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#475569;">' +
            '<h2>Not running inside Fishbowl</h2>' +
            '<p>This report requires the Fishbowl embedded browser environment.</p></div>';
        throw new Error('runQuery not available');
    }

    // ============================================================
    // IDENTITY & RUNTIME FLAGS
    // ============================================================
    var _user        = JSON.parse(getUser());
    var _currentUser = _user.id || _user.userId;

    var _currencyLocale = (function() {
        try { return typeof currencyLocale === 'function' ? currencyLocale() : { locale: 'en-US', symbol: '$' }; }
        catch(e) { return { locale: 'en-US', symbol: '$' }; }
    })();
    var _currencySymbol = _currencyLocale.symbol || '$';
    var _localeCode     = _currencyLocale.locale || 'en-US';

    var DEBUG_MODE = (function() {
        try { return (typeof getProperty === 'function' ? getProperty('BI_SHOW_DEBUG', 'false') : 'false') === 'true'; }
        catch(e) { return false; }
    })();

    // ============================================================
    // DATE FORMAT (respects Fishbowl company setting)
    // ============================================================
    var DATE_FORMAT_SHORT = 'MM/DD/YYYY';
    (function() {
        try {
            var jf = typeof getProperty === 'function' ? getProperty('DateFormatShort', 'MM/dd/yyyy') : 'MM/dd/yyyy';
            DATE_FORMAT_SHORT = jf.replace(/yyyy/g,'YYYY').replace(/dd/g,'DD');
        } catch(e) {}
    })();

    function formatDate(dateStr) {
        if (!dateStr || dateStr.length < 10) return dateStr || '';
        var y = dateStr.substring(0,4), m = dateStr.substring(5,7), d = dateStr.substring(8,10);
        return DATE_FORMAT_SHORT.replace('YYYY',y).replace('MM',m).replace('DD',d);
    }

    // ============================================================
    // FISHBOWL QUERY NORMALISER
    // Always call runQueryP(sql) instead of runQuery/runQueryAsync directly.
    // Resolves to an array of row objects — never null, never a string.
    // ============================================================
    function normaliseQueryResult(result) {
        if (result == null) return [];
        // runQueryAsync already returns a parsed array; the string branch is a safety net for the runQuery fallback path
        if (typeof result === 'string') {
            try { var p = JSON.parse(result); return Array.isArray(p) ? p : []; } catch(_) { return []; }
        }
        return Array.isArray(result) ? result : [];
    }

    async function runQueryP(sql) {
        if (typeof runQueryAsync === 'function') return normaliseQueryResult(await runQueryAsync(sql));
        return normaliseQueryResult(runQuery(sql));
    }

    // ============================================================
    // SQL HELPERS
    // ============================================================

    // Escape a value for SQL string literals.  Returns a single space for
    // blank/null so columns never receive an empty string (Fishbowl quirk).
    function esc(val) {
        if (val === null || val === undefined || String(val).trim() === '') return ' ';
        return String(val).replace(/'/g, "''");
    }

    // Escape without the blank→space behaviour (use for identifiers or numbers).
    function escSQL(val) {
        if (val === null || val === undefined) return '';
        return String(val).replace(/'/g, "''");
    }

    function formatNumber(val, decimals) {
        if (val === null || val === undefined || val === '') return '0';
        var n = parseFloat(val);
        if (isNaN(n)) return '0';
        decimals = (decimals === undefined) ? 0 : decimals;
        return n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    }

    // formatMoney — use this instead of the Fishbowl built-in formatCurrency() to avoid a name collision
    function formatMoney(val, showDecimals) {
        var num = parseFloat(val || 0);
        var isNeg = num < 0;
        var abs = Math.abs(num);
        var dec = (showDecimals === false) ? 0 : 2;
        var formatted = abs.toLocaleString(_localeCode, { minimumFractionDigits: dec, maximumFractionDigits: dec });
        return isNeg ? '-' + _currencySymbol + formatted : _currencySymbol + formatted;
    }

    // ============================================================
    // DEBUG CONSOLE
    // ============================================================
    function debugLog(message, type) {
        type = type || 'info';
        if (!DEBUG_MODE) return;
        var ts = new Date().toLocaleTimeString();
        var prefix = type === 'error' ? '[ERR]' : type === 'warn' ? '[WRN]' : type === 'success' ? '[OK ]' : '[INF]';
        console.log(prefix + ' [' + ts + '] ' + message);
        var logDiv = document.getElementById('debugLog');
        if (!logDiv) return;
        if (logDiv.querySelector('.italic')) logDiv.innerHTML = '';
        var colors = { info:'color:#60a5fa', warn:'color:#facc15', error:'color:#f87171', success:'color:#4ade80', query:'color:#a78bfa' };
        var entry = document.createElement('div');
        entry.style.marginBottom = '2px';
        entry.innerHTML = '<span style="color:#64748b">[' + ts + ']</span> <span style="' + (colors[type] || colors.info) + '">' + message + '</span>';
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // ============================================================
    // DATE RANGE HELPERS (moment.js)
    // Uses TIMESTAMP 'YYYY-MM-DD HH:MM:SS' literals for Fishbowl SQL.
    // FY = July 1 → June 30; adjust getFYDates if your FY differs.
    // ============================================================

    function getQuarterDates(offset) {
        offset = offset || 0;
        var now = moment();
        var qStartMonth = Math.floor(now.month() / 3) * 3 - (offset * 3);
        var start = moment([now.year(), qStartMonth, 1]);
        var end   = moment(start).add(2, 'months').endOf('month');
        return { start: start.format('YYYY-MM-DD'), end: end.format('YYYY-MM-DD') };
    }

    function getFYDates(offset) {
        offset = offset || 0;
        var now = moment();
        var fyYear = (now.month() >= 6 ? now.year() : now.year() - 1) - offset;
        return { start: fyYear + '-07-01', end: (fyYear + 1) + '-06-30' };
    }

    function getCalendarYearDates(offset) {
        offset = offset || 0;
        var y = moment().year() - offset;
        return { start: y + '-01-01', end: y + '-12-31' };
    }

    function getDateRange() {
        var sel = document.getElementById('dateRangeSel').value;
        if (sel === 'custom') {
            return {
                start: document.getElementById('startDate').value,
                end:   document.getElementById('endDate').value
            };
        }
        switch (sel) {
            case 'thisQuarter':  return getQuarterDates(0);
            case 'lastQuarter':  return getQuarterDates(1);
            case 'thisFY':       return getFYDates(0);
            case 'lastFY':       return getFYDates(1);
            case 'thisCalYear':  return getCalendarYearDates(0);
            case 'lastCalYear':  return getCalendarYearDates(1);
            default:             return getFYDates(0);
        }
    }

    // Returns a SQL fragment: dateColumn >= TIMESTAMP '...' AND dateColumn <= TIMESTAMP '...'
    function getDateCondition(dateColumn) {
        var r = getDateRange();
        if (!r.start || !r.end) return '1=1';
        return dateColumn + " >= TIMESTAMP '" + r.start + " 00:00:00' AND " +
               dateColumn + " <= TIMESTAMP '" + r.end   + " 23:59:59'";
    }

    function handleDateRangeChange() {
        var sel = document.getElementById('dateRangeSel').value;
        document.getElementById('customDateInputs').classList.toggle('hidden', sel !== 'custom');
        if (sel !== 'custom') loadDashboard();
    }

    function handleCustomDateChange() {

    }

    // ============================================================
    // BI SETTINGS BRIDGE
    // saveSettings / loadSettings are user-scoped (per Fishbowl user).
    // Keys are namespaced: 'cdx.bi.<report-name>'
    // ============================================================
    var _BI_USER_KEY = 'cdx.bi.template'; // TODO: change to your report key

    function _biReady() {
        return typeof window.saveSettings === 'function' && typeof window.loadSettings === 'function';
    }

    // Hardcoded defaults — shown when user has no saved settings.
    var _BI_DEFAULTS = {
        v: 1,
        example1: false,
        example2: false
        // Add your report-specific settings here
    };

    function loadBISettings() {
        debugLog('loadBISettings: bridge ready=' + _biReady(), 'info');
        if (!_biReady()) { debugLog('loadBISettings: bridge not available, using defaults', 'warn'); return Object.assign({}, _BI_DEFAULTS); }
        try {
            var raw = window.loadSettings(_BI_USER_KEY);
            debugLog('loadBISettings: raw=' + (raw ? raw.substring(0,120) : 'null'), 'query');
            if (raw) {
                var parsed = Object.assign({}, _BI_DEFAULTS, JSON.parse(raw));
                debugLog('loadBISettings: loaded ' + JSON.stringify(parsed), 'success');
                return parsed;
            }
        } catch(e) { debugLog('loadBISettings error: ' + e, 'error'); }
        return Object.assign({}, _BI_DEFAULTS);
    }

    function _buildSettingsPayload() {
        return {
            v: 1,
            example1: document.getElementById('settingExample1').checked,
            example2: document.getElementById('settingExample2').checked
            // Add your report-specific settings here
        };
    }

    function _applySettingsVars(s) {
        // TODO: map s.* to your runtime vars, then sync modal checkboxes
        var el1 = document.getElementById('settingExample1');
        var el2 = document.getElementById('settingExample2');
        if (el1) el1.checked = !!s.example1;
        if (el2) el2.checked = !!s.example2;
    }

    // ============================================================
    // SETTINGS MODAL
    // ============================================================
    function openSettingsModal() {
        _applySettingsVars(loadBISettings());
        document.getElementById('settingsModal').classList.remove('hidden');
    }

    function closeSettingsModal() {
        document.getElementById('settingsModal').classList.add('hidden');
    }

    function _commitSettings() {
        // Read modal → update runtime vars
        // TODO: set your runtime vars from the checkboxes here
        closeSettingsModal();
        applyFilters(); // or loadDashboard() if settings change the SQL
    }

    function applySettingsOnly()   { _commitSettings(); }

    function applyAndSaveSettings() {
        _commitSettings();
        if (!_biReady()) { debugLog('applyAndSaveSettings: bridge not available', 'warn'); return; }
        try {
            var payload = _buildSettingsPayload();
            debugLog('applyAndSaveSettings: saving ' + JSON.stringify(payload), 'query');
            window.saveSettings(_BI_USER_KEY, JSON.stringify(payload));
            debugLog('applyAndSaveSettings: saved', 'success');
        } catch(e) { debugLog('applyAndSaveSettings error: ' + e, 'error'); }
    }

    function resetSettingsDefaults() {
        _applySettingsVars(_BI_DEFAULTS);
    }

    window.openSettingsModal      = openSettingsModal;
    window.closeSettingsModal     = closeSettingsModal;
    window.applySettingsOnly      = applySettingsOnly;
    window.applyAndSaveSettings   = applyAndSaveSettings;
    window.resetSettingsDefaults  = resetSettingsDefaults;

    // DRILLDOWN MODAL
    // ============================================================
    function openDrilldown(title, subtitle, rows, columns) {
        document.getElementById('drilldownTitle').textContent    = title;

    // ============================================================
    // FILTER STATE & HELPERS
    // ============================================================
    var _dataset = [];

    function applyFilters() {
        var search = (document.getElementById('filterSearch').value || '').toLowerCase();
        var cat    = document.getElementById('filterCategory').value;

        var filtered = _dataset.filter(function(row) {
            if (search && !(JSON.stringify(row)).toLowerCase().includes(search)) return false;
            if (cat !== '%' && row.category !== cat) return false;
            return true;
        });

        renderTable(filtered);
    }

    function clearFilters() {
        document.getElementById('filterSearch').value = '';
        document.getElementById('filterCategory').value = '%';
        applyFilters();
    }

    window.applyFilters   = applyFilters;
    window.clearFilters   = clearFilters;

    // ============================================================
    // RENDER HELPERS
    // ============================================================

    // Replace with your actual column definitions.
    var _columns = [
        { key: 'col1', label: 'Column 1' },
        { key: 'col2', label: 'Column 2' }
    ];

    function renderTable(rows) {
        var thead = document.getElementById('reportTableHead');
        var tbody = document.getElementById('reportTableBody');
        if (!thead || !tbody) return;

        thead.innerHTML = '<tr>' + _columns.map(function(c) { return '<th>' + c.label + '</th>'; }).join('') + '</tr>';
        tbody.innerHTML = rows.map(function(row) {
            return '<tr>' + _columns.map(function(c) { return '<td>' + (row[c.key] != null ? row[c.key] : '') + '</td>'; }).join('') + '</tr>';
        }).join('') || '<tr><td colspan="' + _columns.length + '" style="text-align:center;color:#94a3b8;padding:32px;">No data</td></tr>';
    }

    // ============================================================
    // EXPORT
    // ============================================================
    function exportToCSV() {
        if (!_dataset.length) return;
        var header = _columns.map(function(c) { return '"' + c.label + '"'; }).join(',');
        var body = _dataset.map(function(row) {
            return _columns.map(function(c) {
                var v = row[c.key] != null ? String(row[c.key]).replace(/"/g,'""') : '';
                return '"' + v + '"';
            }).join(',');
        }).join('\n');
        var blob = new Blob([header + '\n' + body], { type: 'text/csv' });
        var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = 'export.csv'; a.click();
    }

    window.exportToCSV = exportToCSV;

    // ============================================================
    // MAIN DATA LOAD
    //
    // Load token pattern: capture a token before every await so stale
    // async loads don't clobber a newer one.
    //   var tok = ++_loadToken;
    //   const rows = await runQueryP(sql);
    //   if (tok !== _loadToken) return;   // superseded
    // ============================================================
    var _loadToken = 0;

    async function loadDashboard() {
        var tok = ++_loadToken;
        debugLog('loadDashboard [' + tok + ']: start', 'info');
        document.getElementById('loadingOverlay').style.display = 'flex';

        try {
            // ---- Apply saved settings before building the query ----
            var settings = loadBISettings();
            _applySettingsVars(settings);

            // ---- Build and run your query ----
            var range = getDateRange();
            var sql = 'SELECT 1 AS col1, 2 AS col2'; // TODO: replace with real query
            debugLog('loadDashboard [' + tok + ']: SQL=' + sql.replace(/\s+/g,' ').trim(), 'query');

            var rows = await runQueryP(sql);
            if (tok !== _loadToken) { debugLog('loadDashboard [' + tok + ']: superseded', 'warn'); return; }

            debugLog('loadDashboard [' + tok + ']: ' + rows.length + ' rows', 'success');
            _dataset = rows;

            // ---- Populate filter dropdowns with live data (first load only) ----
            // loadFilters();

            // ---- Render ----
            applyFilters();

            // ---- Update KPI cards if present ----
            // document.getElementById('kpiCards').innerHTML = ...;

        } catch(e) {
            debugLog('loadDashboard [' + tok + ']: ERROR ' + e, 'error');
            console.error(e);
        } finally {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    }

    window.loadDashboard = loadDashboard;

    // ============================================================
    // INIT
    // ============================================================
    window.addEventListener('DOMContentLoaded', function() {
        if (DEBUG_MODE) {
            var c = document.getElementById('debugConsoleContainer');
            if (c) c.style.display = 'block';
            debugLog('BI_SHOW_DEBUG=true — debug console active', 'success');
            debugLog('User id=' + _currentUser, 'info');
        }

        document.getElementById('headerContainer').style.display = 'flex';
        loadDashboard();
    });

    <!-- Dashboard help tooltip -->
    <div id="dashTooltip" class="dash-tooltip"></div>

    <script>
        /* ── Dashboard help tooltip system ── */
        (function () {
            function getTooltip() { return document.getElementById('dashTooltip'); }

            function show(event, text) {
                const t = getTooltip();
                if (!t) return;
                t.textContent = text;
                t.classList.add('show');
                position(event);
            }

            function hide() {
                const t = getTooltip();
                if (t) t.classList.remove('show');
            }

            function position(event) {
                const t = getTooltip();
                if (!t) return;
                const x = event.clientX + 15, y = event.clientY + 15;
                const w = 280, h = 120;
                t.style.left = (x + w > window.innerWidth  ? event.clientX - w - 15 : x) + 'px';
                t.style.top  = (y + h > window.innerHeight ? event.clientY - h - 15 : y) + 'px';
            }

            document.addEventListener('mouseover',  function(e) {
                const el = e.target.closest('[data-tooltip]');
                if (el) show(e, el.dataset.tooltip);
            });
            document.addEventListener('mousemove',  function(e) {
                const el = e.target.closest('[data-tooltip]');
                if (el) position(e);
            });
            document.addEventListener('mouseout',   function(e) {
                if (e.target.closest('[data-tooltip]')) hide();
            });
        })();
    </script>
