<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Dashboard</title>

    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Moment.js for date formatting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            padding: 12px;
            min-height: 100vh;
        }

        /* ============================================================
           Page Header
        ============================================================ */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .page-title {
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
        }

        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 7px 14px;
            font-size: 13px;
            font-weight: 600;
            background: #2d9cdb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
        }

        .refresh-btn:active {
            background: #1e7bb4;
        }

        .refresh-icon {
            font-size: 15px;
            line-height: 1;
        }

        /* ============================================================
           KPI Tile
        ============================================================ */
        .kpi-section {
            margin-bottom: 12px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.10);
        }

        .kpi-tile {
            display: flex;
            align-items: center;
            padding: 16px 18px;
            cursor: pointer;
            user-select: none;
            transition: filter 0.15s;
            position: relative;
        }

        .kpi-tile:active {
            filter: brightness(0.93);
        }

        /* Colour themes per tile */
        .kpi-picks   { background: #1a73e8; }
        .kpi-ships   { background: #0f9d58; }
        .kpi-receipts { background: #f4511e; }

        .kpi-icon {
            font-size: 34px;
            margin-right: 16px;
            line-height: 1;
            flex-shrink: 0;
        }

        .kpi-text {
            flex: 1;
        }

        .kpi-label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.80);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 2px;
        }

        .kpi-count {
            font-size: 42px;
            font-weight: 800;
            color: #fff;
            line-height: 1;
        }

        .kpi-count.loading {
            font-size: 22px;
            font-weight: 500;
            color: rgba(255,255,255,0.65);
        }

        .kpi-chevron {
            font-size: 20px;
            color: rgba(255,255,255,0.70);
            transition: transform 0.25s ease;
            flex-shrink: 0;
        }

        .kpi-chevron.open {
            transform: rotate(180deg);
        }

        /* ============================================================
           Drilldown Panel
        ============================================================ */
        .drilldown {
            display: none;
            background: white;
            border-top: 1px solid rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .drilldown.open {
            display: block;
        }

        .drilldown-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #f8f9fa;
            border-bottom: 1px solid #e2e8f0;
        }

        .drilldown-count-label {
            font-size: 12px;
            font-weight: 600;
            color: #475569;
        }

        /* ============================================================
           Mobile Table
        ============================================================ */
        .mobile-table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .mobile-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            min-width: 380px;
        }

        .mobile-table th {
            background: #f8f9fa;
            padding: 9px 10px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            border-bottom: 2px solid #e2e8f0;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }

        .mobile-table td {
            padding: 9px 10px;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }

        .mobile-table tr:last-child td {
            border-bottom: none;
        }

        .mobile-table tr:nth-child(even) td {
            background: #fafafa;
        }

        .mobile-table tr:active td {
            background: #f0f7ff;
        }

        /* ============================================================
           Status Badges
        ============================================================ */
        .status-badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-estimate   { background: #fff3cd; color: #856404; }
        .status-inprogress { background: #cce5ff; color: #004085; }
        .status-issued     { background: #d4edda; color: #155724; }
        .status-entered    { background: #fff3cd; color: #856404; }
        .status-started    { background: #cce5ff; color: #004085; }
        .status-topick     { background: #fff3cd; color: #856404; }
        .status-picking    { background: #cce5ff; color: #004085; }
        .status-committed  { background: #e0d9f7; color: #4c1d95; }
        .status-picked     { background: #d4edda; color: #155724; }
        .status-packed     { background: #c3e6cb; color: #0f5132; }
        .status-shipped    { background: #e2e8f0; color: #475569; }
        .status-received   { background: #d4edda; color: #155724; }
        .status-reconciled { background: #e2e8f0; color: #475569; }

        /* ============================================================
           Type Badge
        ============================================================ */
        .type-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            background: #e2e8f0;
            color: #334155;
        }

        /* ============================================================
           Schedule Clock Icon
        ============================================================ */
        .sched-icon {
            display: inline-block;
            vertical-align: middle;
        }

        .sched-icon svg {
            width: 16px;
            height: 16px;
            display: block;
        }

        /* ============================================================
           Availability Circle
        ============================================================ */
        .avail-circle {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            vertical-align: middle;
            border: 2px solid transparent;
            flex-shrink: 0;
        }

        .avail-circle.green  { background: #10b981; border-color: #059669; }
        .avail-circle.orange { background: #fbbf24; border-color: #b8860b; }
        .avail-circle.red    { background: #ef4444; border-color: #dc2626; }
        .avail-circle.gray   { background: #9ca3af; border-color: #6b7280; }

        /* ============================================================
           Empty / Loading State
        ============================================================ */
        .table-msg {
            text-align: center;
            padding: 22px 16px;
            color: #94a3b8;
            font-size: 13px;
        }

        /* ============================================================
           Last Updated
        ============================================================ */
        .last-updated {
            text-align: center;
            font-size: 11px;
            color: #94a3b8;
            margin-top: 14px;
            padding-bottom: 8px;
        }
    </style>
</head>
<body>

    <div class="page-header">
        <div class="page-title">Dashboard</div>
        <button class="refresh-btn" onclick="MobileDash.refreshAll()">
            <span class="refresh-icon">↻</span> Refresh
        </button>
    </div>

    <!-- ── Picks ─────────────────────────────────────────────────── -->
    <div class="kpi-section" id="section-picks">
        <div class="kpi-tile kpi-picks" onclick="MobileDash.toggleSection('picks')">
            <div class="kpi-icon">📦</div>
            <div class="kpi-text">
                <div class="kpi-label">Picks</div>
                <div class="kpi-count loading" id="kpi-picks-count">—</div>
            </div>
            <div class="kpi-chevron" id="chevron-picks">▼</div>
        </div>
        <div class="drilldown" id="drilldown-picks">
            <div class="drilldown-header">
                <span class="drilldown-count-label" id="label-picks">Open picks</span>
            </div>
            <div class="mobile-table-wrap">
                <table class="mobile-table" id="table-picks">
                    <thead>
                        <tr>
                            <th style="width:28px"></th>
                            <th style="width:28px"></th>
                            <th>Pick #</th>
                            <th>Status</th>
                            <th>Order</th>
                            <th>For</th>
                            <th>Sched. Date</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-picks">
                        <tr><td colspan="7" class="table-msg">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ── Shipments ─────────────────────────────────────────────── -->
    <div class="kpi-section" id="section-ships">
        <div class="kpi-tile kpi-ships" onclick="MobileDash.toggleSection('ships')">
            <div class="kpi-icon">🚚</div>
            <div class="kpi-text">
                <div class="kpi-label">Shipments</div>
                <div class="kpi-count loading" id="kpi-ships-count">—</div>
            </div>
            <div class="kpi-chevron" id="chevron-ships">▼</div>
        </div>
        <div class="drilldown" id="drilldown-ships">
            <div class="drilldown-header">
                <span class="drilldown-count-label" id="label-ships">Pending shipments</span>
            </div>
            <div class="mobile-table-wrap">
                <table class="mobile-table" id="table-ships">
                    <thead>
                        <tr>
                            <th style="width:28px"></th>
                            <th>Ship #</th>
                            <th>Status</th>
                            <th>Order</th>
                            <th>Ship To</th>
                            <th>Sched. Date</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-ships">
                        <tr><td colspan="6" class="table-msg">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ── Receivals ─────────────────────────────────────────────── -->
    <div class="kpi-section" id="section-receipts">
        <div class="kpi-tile kpi-receipts" onclick="MobileDash.toggleSection('receipts')">
            <div class="kpi-icon">📥</div>
            <div class="kpi-text">
                <div class="kpi-label">Receivals</div>
                <div class="kpi-count loading" id="kpi-receipts-count">—</div>
            </div>
            <div class="kpi-chevron" id="chevron-receipts">▼</div>
        </div>
        <div class="drilldown" id="drilldown-receipts">
            <div class="drilldown-header">
                <span class="drilldown-count-label" id="label-receipts">Pending receivals</span>
            </div>
            <div class="mobile-table-wrap">
                <table class="mobile-table" id="table-receipts">
                    <thead>
                        <tr>
                            <th style="width:28px"></th>
                            <th>Type</th>
                            <th>Order</th>
                            <th>Status</th>
                            <th>Vendor / Source</th>
                            <th>Exp. Date</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-receipts">
                        <tr><td colspan="6" class="table-msg">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="last-updated" id="lastUpdated"></div>

    <script>
    // ============================================================================
    //  Mobile Dashboard
    // ============================================================================
    window.MobileDash = (function () {
        'use strict';

        // ── Fishbowl properties ────────────────────────────────────────────────
        const FB_DATE_FORMAT = typeof getProperty === 'function'
            ? getProperty('DateFormatShort', 'MM/dd/yyyy') : 'MM/dd/yyyy';

        const MOMENT_FORMAT = FB_DATE_FORMAT
            .replace(/yyyy/g, 'YYYY').replace(/yy/g, 'YY').replace(/dd/g, 'DD');

        // ── State ──────────────────────────────────────────────────────────────
        const state = {
            picks:    { data: [], open: false },
            ships:    { data: [], open: false },
            receipts: { data: [], open: false }
        };

        // ── Helpers ────────────────────────────────────────────────────────────
        function fmtDate(str) {
            if (!str) return '';
            return moment(str).format(MOMENT_FORMAT);
        }

        function getUserId() {
            try {
                return JSON.parse(getUser()).id;
            } catch (e) {
                return 0;
            }
        }

        function runSQL(query) {
            try {
                return JSON.parse(runQuery(query));
            } catch (e) {
                console.error('Query error:', e);
                return [];
            }
        }

        /** Clock SVG coloured by schedule status */
        function schedIcon(dateStr) {
            if (!dateStr) return '';
            const parts = dateStr.split(' ')[0].split('-');
            const d = new Date(+parts[0], +parts[1] - 1, +parts[2]);
            const today = new Date(); today.setHours(0,0,0,0); d.setHours(0,0,0,0);
            let color = '';
            if (d.getTime() === today.getTime()) color = '#f59e0b';
            else if (d < today) color = '#ef4444';
            else {
                const wkStart = new Date(today);
                wkStart.setDate(today.getDate() - today.getDay());
                const wkEnd = new Date(wkStart);
                wkEnd.setDate(wkStart.getDate() + 6);
                if (d >= wkStart && d <= wkEnd) color = '#2d9cdb';
            }
            if (!color) return '';
            return `<span class="sched-icon" title="${color === '#ef4444' ? 'Past due' : color === '#f59e0b' ? 'Due today' : 'This week'}">
                <svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg></span>`;
        }

        /** Small coloured circle for pick availability */
        function availCircle(row) {
            const s = row.availabilitystatus || 'gray';
            let title = '';
            if (s === 'green')  title = 'All items available';
            else if (s === 'orange') title = 'Partially available';
            else if (s === 'red')    title = 'None available';
            else if (s === 'committed') title = 'Committed';
            return `<div class="avail-circle ${s === 'committed' ? 'orange' : s}" title="${title}"></div>`;
        }

        /** Availability status from pick counts */
        function calcPickAvail(row) {
            const pending   = +row.pendingitems  || 0;
            const committed = +row.committeditems || 0;
            const full      = +row.fullitems      || 0;
            const none      = +row.noneitems      || 0;

            if (pending === 0)            return 'gray';
            if (committed === pending)    return 'committed';
            if (none > 0 && full === 0)   return 'red';
            if (full === pending - committed) return 'green';
            return 'orange';
        }

        function statusBadge(status) {
            if (!status) return '';
            const key = status.toLowerCase().replace(/\s+/g, '').replace('*','');
            const map = {
                'estimate':   'status-estimate',
                'inprogress': 'status-inprogress',
                'issued':     'status-issued',
                'entered':    'status-entered',
                'started':    'status-started',
                'topick':     'status-topick',
                'picking':    'status-picking',
                'committed':  'status-committed',
                'finished':   'status-picked',
                'picked':     'status-picked',
                'packed':     'status-packed',
                'shipped':    'status-shipped',
                'received':   'status-received',
                'reconciled': 'status-reconciled',
            };
            const cls = map[key] || '';
            return `<span class="status-badge ${cls}">${escHtml(status)}</span>`;
        }

        function typeBadge(type) {
            return `<span class="type-badge">${escHtml(type || '')}</span>`;
        }

        function escHtml(s) {
            return String(s || '')
                .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function setKpi(section, count) {
            const el = document.getElementById('kpi-' + section + '-count');
            if (!el) return;
            el.textContent = count;
            el.classList.remove('loading');
        }

        function setLabel(section, text) {
            const el = document.getElementById('label-' + section);
            if (el) el.textContent = text;
        }

        // ── Toggle drilldown ───────────────────────────────────────────────────
        function toggleSection(section) {
            const s = state[section];
            s.open = !s.open;

            const panel    = document.getElementById('drilldown-' + section);
            const chevron  = document.getElementById('chevron-' + section);

            if (s.open) {
                panel.classList.add('open');
                chevron.classList.add('open');
            } else {
                panel.classList.remove('open');
                chevron.classList.remove('open');
            }
        }

        // ── Load Picks ─────────────────────────────────────────────────────────
        function loadPicks(userId) {
            const query =
                "SELECT " +
                "    Pick.Id AS id, " +
                "    Pick.Num AS num, " +
                "    Pick.DateScheduled AS datescheduled, " +
                "    PickStatus.Name AS statusname, " +
                "    Priority.Name AS priorityname, " +
                "    COALESCE(" +
                "        (SELECT So.Num FROM PickItem JOIN SoItem ON PickItem.SoItemId = SoItem.Id JOIN So ON SoItem.SoId = So.Id WHERE PickItem.PickId = Pick.Id AND PickItem.OrderTypeId = 20 LIMIT 1)," +
                "        (SELECT Po.Num FROM PickItem JOIN PoItem ON PickItem.PoItemId = PoItem.Id JOIN Po ON PoItem.PoId = Po.Id WHERE PickItem.PickId = Pick.Id AND PickItem.OrderTypeId = 10 LIMIT 1)," +
                "        (SELECT Wo.Num FROM PickItem JOIN WoItem ON PickItem.WoItemId = WoItem.Id JOIN Wo ON WoItem.WoId = Wo.Id WHERE PickItem.PickId = Pick.Id AND PickItem.OrderTypeId = 30 LIMIT 1)," +
                "        (SELECT Xo.Num FROM PickItem JOIN XoItem ON PickItem.XoItemId = XoItem.Id JOIN Xo ON XoItem.XoId = Xo.Id WHERE PickItem.PickId = Pick.Id AND PickItem.OrderTypeId = 40 LIMIT 1)," +
                "        'N/A'" +
                "    ) AS ordernum, " +
                "    COALESCE(" +
                "        (SELECT Customer.Name FROM PickItem JOIN SoItem ON PickItem.SoItemId = SoItem.Id JOIN So ON SoItem.SoId = So.Id JOIN Customer ON So.CustomerId = Customer.Id WHERE PickItem.PickId = Pick.Id AND PickItem.OrderTypeId = 20 LIMIT 1)," +
                "        (SELECT Vendor.Name FROM PickItem JOIN PoItem ON PickItem.PoItemId = PoItem.Id JOIN Po ON PoItem.PoId = Po.Id JOIN Vendor ON Po.VendorId = Vendor.Id WHERE PickItem.PickId = Pick.Id AND PickItem.OrderTypeId = 10 LIMIT 1)," +
                "        (SELECT LocationGroup.Name FROM PickItem JOIN WoItem ON PickItem.WoItemId = WoItem.Id JOIN Wo ON WoItem.WoId = Wo.Id JOIN LocationGroup ON Wo.LocationGroupId = LocationGroup.Id WHERE PickItem.PickId = Pick.Id AND PickItem.OrderTypeId = 30 LIMIT 1)," +
                "        (SELECT LocationGroup.Name FROM PickItem JOIN XoItem ON PickItem.XoItemId = XoItem.Id JOIN Xo ON XoItem.XoId = Xo.Id JOIN LocationGroup ON Xo.ShipToLgId = LocationGroup.Id WHERE PickItem.PickId = Pick.Id AND PickItem.OrderTypeId = 40 LIMIT 1)," +
                "        'N/A'" +
                "    ) AS orderinfo, " +
                "    (SELECT COUNT(*) FROM PickItem WHERE PickItem.PickId = Pick.Id AND PickItem.StatusId < 40 AND (PickItem.StatusId = 30 OR (PickItem.StatusId IN (10,11,20) AND (COALESCE((SELECT qty FROM qtyonhand WHERE partId=PickItem.PartId AND locationGroupId=Pick.LocationGroupId),0)-COALESCE((SELECT qty FROM qtycommitted WHERE partId=PickItem.PartId AND locationGroupId=Pick.LocationGroupId),0)-COALESCE((SELECT qty FROM qtynotavailabletopick WHERE partId=PickItem.PartId AND locationGroupId=Pick.LocationGroupId),0))>=PickItem.Qty))) AS fullitems, " +
                "    (SELECT COUNT(*) FROM PickItem WHERE PickItem.PickId = Pick.Id AND PickItem.StatusId < 40) AS pendingitems, " +
                "    (SELECT COUNT(*) FROM PickItem WHERE PickItem.PickId = Pick.Id AND PickItem.StatusId = 30) AS committeditems, " +
                "    (SELECT COUNT(*) FROM PickItem WHERE PickItem.PickId = Pick.Id AND PickItem.StatusId < 40 AND (PickItem.StatusId IN (5,6) OR (PickItem.StatusId IN (10,11,20) AND (COALESCE((SELECT qty FROM qtyonhand WHERE partId=PickItem.PartId AND locationGroupId=Pick.LocationGroupId),0)-COALESCE((SELECT qty FROM qtycommitted WHERE partId=PickItem.PartId AND locationGroupId=Pick.LocationGroupId),0)-COALESCE((SELECT qty FROM qtynotavailabletopick WHERE partId=PickItem.PartId AND locationGroupId=Pick.LocationGroupId),0))<=0))) AS noneitems " +
                "FROM Pick " +
                "LEFT JOIN PickStatus ON Pick.StatusId = PickStatus.Id " +
                "LEFT JOIN Priority ON Pick.Priority = Priority.Id " +
                "INNER JOIN UserToLG ON Pick.LocationGroupId = UserToLG.LocationGroupId AND UserToLG.UserId = " + userId + " " +
                "WHERE Pick.StatusId < 40 " +
                "ORDER BY Pick.DateScheduled ASC";

            const rows = runSQL(query);
            state.picks.data = rows;

            // Attach computed availability
            rows.forEach(function(r) {
                r.availabilitystatus = calcPickAvail(r);
            });

            setKpi('picks', rows.length);
            setLabel('picks', rows.length + ' open pick' + (rows.length !== 1 ? 's' : ''));
            renderPicks(rows);
        }

        function renderPicks(rows) {
            const tbody = document.getElementById('tbody-picks');
            if (!tbody) return;

            if (!rows || rows.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="table-msg">No open picks</td></tr>';
                return;
            }

            let html = '';
            rows.forEach(function(r) {
                const sched  = schedIcon(r.datescheduled);
                const avail  = availCircle(r);
                const status = r.statusname === 'Entered' ? 'To Pick'
                             : r.statusname === 'Started' ? 'Picking'
                             : (r.statusname || '');
                html +=
                    '<tr>' +
                    '<td style="text-align:center;padding:9px 4px;">' + (sched || '') + '</td>' +
                    '<td style="text-align:center;padding:9px 4px;">' + avail + '</td>' +
                    '<td><strong>' + escHtml(r.num) + '</strong></td>' +
                    '<td>' + statusBadge(status) + '</td>' +
                    '<td>' + escHtml(r.ordernum) + '</td>' +
                    '<td style="max-width:130px;">' + escHtml(r.orderinfo) + '</td>' +
                    '<td>' + fmtDate(r.datescheduled) + '</td>' +
                    '</tr>';
            });
            tbody.innerHTML = html;
        }

        // ── Load Shipments ─────────────────────────────────────────────────────
        function loadShips(userId) {
            const query =
                "SELECT " +
                "    Ship.Id AS id, " +
                "    Ship.Num AS num, " +
                "    Ship.OrderTypeId AS ordertypeid, " +
                "    Ship.ShipToName AS shipto, " +
                "    ShipStatus.Name AS statusname, " +
                "    Carrier.Name AS carrier, " +
                "    CASE " +
                "        WHEN Ship.OrderTypeId = 20 THEN So.Num " +
                "        WHEN Ship.OrderTypeId = 10 THEN Po.Num " +
                "        WHEN Ship.OrderTypeId = 40 THEN Xo.Num " +
                "    END AS ordernum, " +
                "    CASE " +
                "        WHEN Ship.OrderTypeId = 20 THEN 'SO' " +
                "        WHEN Ship.OrderTypeId = 10 THEN 'PO' " +
                "        WHEN Ship.OrderTypeId = 40 THEN 'TO' " +
                "        ELSE 'Other' " +
                "    END AS type, " +
                "    COALESCE(So.DateFirstShip, Po.DateFirstShip, Xo.DateScheduled) AS datescheduled " +
                "FROM Ship " +
                "LEFT JOIN ShipStatus ON Ship.StatusId = ShipStatus.Id " +
                "LEFT JOIN Carrier ON Ship.CarrierId = Carrier.Id " +
                "LEFT JOIN So ON Ship.SoId = So.Id " +
                "LEFT JOIN Po ON Ship.PoId = Po.Id " +
                "LEFT JOIN Xo ON Ship.XoId = Xo.Id " +
                "INNER JOIN UserToLG ON Ship.LocationGroupId = UserToLG.LocationGroupId AND UserToLG.UserId = " + userId + " " +
                "WHERE ShipStatus.Name IN ('Entered', 'Packed') " +
                "ORDER BY datescheduled ASC";

            const rows = runSQL(query);
            state.ships.data = rows;

            setKpi('ships', rows.length);
            setLabel('ships', rows.length + ' pending shipment' + (rows.length !== 1 ? 's' : ''));
            renderShips(rows);
        }

        function renderShips(rows) {
            const tbody = document.getElementById('tbody-ships');
            if (!tbody) return;

            if (!rows || rows.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="table-msg">No pending shipments</td></tr>';
                return;
            }

            let html = '';
            rows.forEach(function(r) {
                const sched = schedIcon(r.datescheduled);
                const orderLabel = r.type && r.ordernum
                    ? escHtml(r.type + '-' + r.ordernum)
                    : escHtml(r.ordernum || '');
                html +=
                    '<tr>' +
                    '<td style="text-align:center;padding:9px 4px;">' + (sched || '') + '</td>' +
                    '<td><strong>' + escHtml(r.num) + '</strong></td>' +
                    '<td>' + statusBadge(r.statusname) + '</td>' +
                    '<td>' + orderLabel + '</td>' +
                    '<td style="max-width:130px;">' + escHtml(r.shipto) + '</td>' +
                    '<td>' + fmtDate(r.datescheduled) + '</td>' +
                    '</tr>';
            });
            tbody.innerHTML = html;
        }

        // ── Load Receivals ─────────────────────────────────────────────────────
        function loadReceipts(userId) {
            const query =
                "SELECT " +
                "    Receipt.Id AS id, " +
                "    Receipt.OrderTypeId AS ordertypeid, " +
                "    ReceiptStatus.Name AS statusname, " +
                "    CASE " +
                "        WHEN Receipt.OrderTypeId = 10 THEN 'PO' " +
                "        WHEN Receipt.OrderTypeId = 20 THEN 'SO' " +
                "        WHEN Receipt.OrderTypeId = 40 THEN 'TO' " +
                "        ELSE 'Other' " +
                "    END AS type, " +
                "    CASE " +
                "        WHEN Receipt.OrderTypeId = 10 THEN (SELECT Num FROM Po WHERE Id = Receipt.PoId) " +
                "        WHEN Receipt.OrderTypeId = 20 THEN (SELECT Num FROM So WHERE Id = Receipt.SoId) " +
                "        WHEN Receipt.OrderTypeId = 40 THEN (SELECT Num FROM Xo WHERE Id = Receipt.XoId) " +
                "        ELSE NULL " +
                "    END AS ordernum, " +
                "    CASE " +
                "        WHEN Receipt.OrderTypeId = 10 THEN (SELECT Vendor.Name FROM Po LEFT JOIN Vendor ON Po.VendorId = Vendor.Id WHERE Po.Id = Receipt.PoId) " +
                "        ELSE NULL " +
                "    END AS vendorname, " +
                "    CASE " +
                "        WHEN Receipt.OrderTypeId = 10 THEN (SELECT DateFirstShip FROM Po WHERE Id = Receipt.PoId) " +
                "        WHEN Receipt.OrderTypeId = 20 THEN (SELECT DateFirstShip FROM So WHERE Id = Receipt.SoId) " +
                "        WHEN Receipt.OrderTypeId = 40 THEN (SELECT DateScheduled FROM Xo WHERE Id = Receipt.XoId) " +
                "        ELSE NULL " +
                "    END AS datescheduled " +
                "FROM Receipt " +
                "LEFT JOIN ReceiptStatus ON Receipt.StatusId = ReceiptStatus.Id " +
                "INNER JOIN UserToLG ON Receipt.LocationGroupId = UserToLG.LocationGroupId AND UserToLG.UserId = " + userId + " " +
                "WHERE ReceiptStatus.Name IN ('Entered', 'Reconciled', 'Received') " +
                "ORDER BY Receipt.Id DESC";

            const rows = runSQL(query);
            state.receipts.data = rows;

            setKpi('receipts', rows.length);
            setLabel('receipts', rows.length + ' pending receival' + (rows.length !== 1 ? 's' : ''));
            renderReceipts(rows);
        }

        function renderReceipts(rows) {
            const tbody = document.getElementById('tbody-receipts');
            if (!tbody) return;

            if (!rows || rows.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="table-msg">No pending receivals</td></tr>';
                return;
            }

            let html = '';
            rows.forEach(function(r) {
                const sched  = schedIcon(r.datescheduled);
                const source = r.vendorname || (r.type === 'SO' ? 'Customer return' : r.type === 'TO' ? 'Transfer' : '');
                html +=
                    '<tr>' +
                    '<td style="text-align:center;padding:9px 4px;">' + (sched || '') + '</td>' +
                    '<td>' + typeBadge(r.type) + '</td>' +
                    '<td><strong>' + escHtml(r.ordernum) + '</strong></td>' +
                    '<td>' + statusBadge(r.statusname) + '</td>' +
                    '<td style="max-width:130px;">' + escHtml(source) + '</td>' +
                    '<td>' + fmtDate(r.datescheduled) + '</td>' +
                    '</tr>';
            });
            tbody.innerHTML = html;
        }

        // ── Update last-updated timestamp ──────────────────────────────────────
        function stampTime() {
            const el = document.getElementById('lastUpdated');
            if (el) el.textContent = 'Last updated: ' + new Date().toLocaleTimeString();
        }

        // ── Load all sections ──────────────────────────────────────────────────
        function loadAll() {
            const userId = getUserId();
            loadPicks(userId);
            loadShips(userId);
            loadReceipts(userId);
            stampTime();
        }

        // ── Public API ─────────────────────────────────────────────────────────
        function refreshAll() {
            // Reset KPI counts to loading state
            ['picks','ships','receipts'].forEach(function(s) {
                const el = document.getElementById('kpi-' + s + '-count');
                if (el) { el.textContent = '—'; el.classList.add('loading'); }
            });
            loadAll();
        }

        // Auto-load on DOM ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadAll);
        } else {
            loadAll();
        }

        return {
            toggleSection: toggleSection,
            refreshAll:    refreshAll
        };
    })();
    </script>

</body>
</html>
